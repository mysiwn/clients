    settingRootServer.value = settings.rootServer || '';
    settingStreamTimeout.value = settings.streamTimeout ?? 60;
    settingsModal.style.display = 'flex';
}

async function closeSettings() {
    clearTimeout(searchTimeout);
    const newProxy = settingProxyUrl.value.trim().replace(/\/+$/, '');
    const newNotify = settingNotifyMode.value;
    if (newProxy && isValidHttpsUrl(newProxy)) {
        await saveClientConfig({ ...clientConfig, proxyBase: newProxy, notifyMode: newNotify });
    } else {
        await saveClientConfig({ ...clientConfig, notifyMode: newNotify });
    }
    settingsModal.style.display = 'none';
}

document.getElementById('settings-close-btn').addEventListener('click', closeSettings);
settingRefresh.addEventListener('change', e => {
    const val = parseInt(e.target.value) || 0;
    settings.refreshInterval = val === 0 ? 0 : Math.max(30, val);
    settingRefresh.value = settings.refreshInterval;
    saveSettings();
});
settingRootServer.addEventListener('change', () => {
    settings.rootServer = settingRootServer.value.trim().replace(/\/+$/, '');
    saveSettings();
});
settingStreamTimeout.addEventListener('change', e => {
    settings.streamTimeout = Math.max(0, parseInt(e.target.value) || 0);
    settingStreamTimeout.value = settings.streamTimeout;
    saveSettings();
});

document.addEventListener('keydown', e => {

});

    const url = new URL(event.request.url);
    if (event.request.mode === 'navigate') { event.respondWith(caches.match(event.request).then(cached => { const fp = fetch(event.request).then(r => { if (r.ok) caches.open(CACHE_NAME).then(c => c.put(event.request, r)); return r.clone(); }).catch(() => cached); return cached || fp; })); return; }
    if (url.pathname === '/image') { event.respondWith(caches.open('ig-media-v1').then(cache => cache.match(event.request).then(cached => { if (cached) return cached; return fetch(event.request).then(r => { if (r.ok) cache.put(event.request, r.clone()); return r; }); }))); return; }
});`;
if ('serviceWorker' in navigator) { const swBlob = new Blob([swCode], { type: 'application/javascript' }); const swUrl = URL.createObjectURL(swBlob); navigator.serviceWorker.register(swUrl, { scope: './' }).catch((e) => { console.warn('[instagram]', e); }); }

// ── Start ─────────────────────────────────────────────────
settingRefresh.value = settings.refreshInterval;
init();

</script>

<script>
// ── Auto-update ───────────────────────────────────────────
const VERSION = '20260319.1';
(async function autoUpdate() {
    const RAW = 'https://raw.githubusercontent.com/mysiwn/clients/main/index.html';
    try {
        const r = await fetch(RAW + '?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const html = await r.text();
        const m = html.match(/const VERSION = '([^']+)'/);
        if (m && m[1] !== VERSION) {
            document.open();
            document.write(html);
            document.close();
        }
    } catch (_) {}
})();

function launchClient(name) {
    var securityJs = document.getElementById('src-security-js').textContent;
    var commonCss = document.getElementById('src-common-css').textContent;
    var themeCss = document.getElementById('src-' + name + '-css').textContent;
    var css = commonCss + '\n' + themeCss;
    var bodyHtml = document.getElementById('src-' + name + '-html').textContent;
    var clientJs = document.getElementById('src-' + name + '-js').textContent;

    var themeColor = name === 'discord' ? '#36393f' : '#000000';
    var title = name === 'discord' ? 'Local Discord Client' : 'Local Instagram Client';

    var cdnScript = name === 'discord'
        ? '<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"><\/script>'
        : '';

    var doc = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
        + '<meta charset="UTF-8">\n'
        + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
        + '<meta name="mobile-web-app-capable" content="yes">\n'
        + '<meta name="apple-mobile-web-app-capable" content="yes">\n'
        + '<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n'
        + '<meta name="theme-color" content="' + themeColor + '">\n'
        + '<title>' + title + '</title>\n'
        + '<style>\n' + css + '\n</style>\n'
        + '</head>\n<body>\n'
        + bodyHtml + '\n'
        + cdnScript + '\n'
        + '<script>\n' + securityJs + '\n<\/script>\n'
        + '<script>\n' + clientJs + '\n<\/script>\n'
        + '</body>\n</html>';

    document.open();
    document.write(doc);
    document.close();
}

async function clearData() {
    if (!confirm(
        'Clear all stored data for Discord and Instagram?\n\n' +
        'This will log you out of both clients and delete all saved credentials, sessions, and settings.'
    )) return;

    try {
        const secCode = document.getElementById('src-security-js').textContent;
        const { SecureStorage } = new Function(secCode + '\nreturn { SecureStorage };')();

        const discordVault = new SecureStorage('discord');
        const instaVault   = new SecureStorage('instagram');
        const hasDiscord   = discordVault.hasVault();
        const hasInsta     = instaVault.hasVault();

        if (hasDiscord || hasInsta) {
            const pin = prompt(
                'Enter your vault PIN to also log out from Discord/Instagram servers.\n' +
                '(Cancel to skip server logout and only clear local data.)'
            );

            if (pin) {
                if (hasDiscord) {
                    try {
                        await discordVault.unlock(pin);
                        const cfgRaw = await discordVault.getItem('client_config');
                        const cfg    = cfgRaw ? JSON.parse(cfgRaw) : {};
                        const token  = await discordVault.getItem('user_token');
                        if (token && cfg.proxyBase) {
                            await fetch(
                                cfg.proxyBase + '/https://discord.com/api/v9/auth/logout',
                                { method: 'POST', headers: { Authorization: token } }
                            ).catch(() => {});
                        }
                    } catch (_) {}
                }
                if (hasInsta) {
                    try {
                        await instaVault.unlock(pin);
                        const cfgRaw = await instaVault.getItem('ig_client_config');
                        const cfg    = cfgRaw ? JSON.parse(cfgRaw) : {};
                        const sid    = await instaVault.getItem('ig_session_id');
                        const csrf   = await instaVault.getItem('ig_csrf_token') || '';
                        if (sid && cfg.proxyBase) {
                            await fetch(
                                cfg.proxyBase + '/https://i.instagram.com/api/v1/accounts/logout/',
                                { method: 'POST', headers: { 'X-CSRFToken': csrf, 'X-IG-Session': sid } }
                            ).catch(() => {});
                        }
                    } catch (_) {}
                }
            }

            discordVault.destroy();
            instaVault.destroy();
        }
    } catch (e) {
        console.warn('[clearData] vault error:', e);
    }

    ['ig_playwright_url'].forEach(k => localStorage.removeItem(k));
    alert('All data cleared. Reloading...');
    location.reload();
}
</script>
