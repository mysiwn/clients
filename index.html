        // ── DMs ───────────────────────────────────────────────
        async function loadDMs() {
            try {
                channelList.innerHTML = '';
                const label = sidebarLabel('Direct Messages');
                const addBtn = document.createElement('span');
                addBtn.className = 'sidebar-label-add';
                addBtn.textContent = '+';
                addBtn.title = 'Open DM';
                addBtn.addEventListener('click', openAddDmModal);
                label.appendChild(addBtn);
                channelList.appendChild(label);

                const dms = await apiCall('/users/@me/channels');
                dms.sort((a, b) => {
                    try {
                        const idA = BigInt(a.last_message_id || 0);
                        const idB = BigInt(b.last_message_id || 0);
                        return idA < idB ? 1 : idA > idB ? -1 : 0;
                    } catch (_) { return 0; }
                });
                dms.forEach(ch => {
                    if (isBlocked(settings.blockedChannels, ch.id)) return;
                    const name = ch.name
                        || ch.recipients?.map(r => r.global_name || r.username).join(', ')
                        || 'Unknown';
                    const div = makeItem('channel-item', name, e => {
                        setActiveChannel(e.currentTarget, name);
                        markChannelRead(ch.id, ch.last_message_id);
                        loadMessages(ch.id);
                    });
                    // Check unread
                    if (ch.last_message_id && isChannelUnread(ch.id, ch.last_message_id)) {
                        div.classList.add('unread');
                    }
                    div.dataset.channelId = ch.id;
                    div.oncontextmenu = e => showContextMenu(e, 'channel', ch.id, name);
                    channelList.appendChild(div);
                    parseTwemoji(div);
                });
            } catch (err) {
                console.error('Failed to load DMs:', err);
            }
        }

        // ── Channels ──────────────────────────────────────────
        async function loadChannels(guildId) {
            try {
                channelList.innerHTML = '';
                channelList.appendChild(sidebarLabel('Text Channels'));
                const channels = await apiCall(`/guilds/${guildId}/channels`);
                const textChannels = channels.filter(c => c.type === 0).sort((a, b) => a.position - b.position);
                currentGuildChannels[guildId] = textChannels;

                let hasUnread = false;
                textChannels.forEach(ch => {
                    if (isBlocked(settings.blockedChannels, ch.id)) return;
                    const displayName = `# ${ch.name}`;
                    const div = makeItem('channel-item', displayName, e => {
                        setActiveChannel(e.currentTarget, displayName);
                        markChannelRead(ch.id, ch.last_message_id);
                        loadMessages(ch.id);
                    });
                    if (ch.last_message_id && isChannelUnread(ch.id, ch.last_message_id)) {
                        div.classList.add('unread');
                        hasUnread = true;
                    }
                    div.dataset.channelId = ch.id;
                    div.oncontextmenu = e => showContextMenu(e, 'channel', ch.id, displayName);
                    channelList.appendChild(div);
                    parseTwemoji(div);
                });

                // Update guild unread indicator
                const guildEl = document.querySelector(`.guild-item[data-guild-id="${guildId}"]`);
                if (guildEl) {
                    guildEl.classList.toggle('unread', hasUnread);
                }
            } catch (err) {
                console.error('Failed to load channels:', err);
            }
        }

        // ── Unread State ─────────────────────────────────────
        function isChannelUnread(channelId, lastMessageId) {
            if (!lastMessageId) return false;
            const lastRead = lastReadMessageIds[channelId];
            if (!lastRead) return true; // never read = unread
            try {
                return BigInt(lastMessageId) > BigInt(lastRead);
            } catch (_) {
                return lastMessageId !== lastRead;
            }
        }

        function markChannelRead(channelId, lastMessageId) {
            if (lastMessageId) {
                lastReadMessageIds[channelId] = lastMessageId;
                saveReadState();
            }
        }

        // ── Messages ──────────────────────────────────────────
        async function loadMessages(channelId, silent = false) {
            currentChannelId      = channelId;
            messageInput.disabled = false;
            sendButton.disabled   = false;
            fileBtn.style.pointerEvents = 'auto';
            fileBtn.style.opacity       = '1';

            const prevScrollTop    = messageList.scrollTop;
            const prevScrollHeight = messageList.scrollHeight;
            const atBottom = (prevScrollHeight - prevScrollTop) <= (messageList.clientHeight + 2);

            if (!silent) {
                clearBlobUrls();
                messageList.innerHTML = '';
                messageList.appendChild(placeholder('Loading messages...'));
            }

            try {
                const messages = await apiCall(`/channels/${channelId}/messages?limit=50`);

                // Discard stale response if channel changed mid-fetch
                if (channelId !== currentChannelId) return;
                if (silent && !messages.length) return;

                // Check for new messages for notifications (on silent/auto-refresh)
                if (silent && messages.length > 0) {
                    const latestMsg = messages[0]; // messages come newest-first
                    const prevLastId = lastReadMessageIds[channelId];
                    if (prevLastId && latestMsg.id !== prevLastId) {
                        // Find new messages since last read
                        for (const msg of messages) {
                            try {
                                if (BigInt(msg.id) <= BigInt(prevLastId)) break;
                            } catch (_) {
                                if (msg.id === prevLastId) break;
                            }
                            if (shouldNotify(channelId, msg)) {
                                sendNotification(msg, channelId);
                            }
                        }
                    }
                }

                // Mark channel as read
                if (messages.length > 0) {
                    markChannelRead(channelId, messages[0].id);
                    // Update sidebar unread indicator
                    const channelEl = document.querySelector(`.channel-item[data-channel-id="${channelId}"]`);
                    if (channelEl) channelEl.classList.remove('unread');
                }

                clearBlobUrls();
                messageList.innerHTML = '';

                if (!messages.length) {
                    messageList.appendChild(placeholder('No messages here yet.'));
                    return;
                }

                messages.reverse().forEach(msg => {
                    if (msg.author && isBlocked(settings.blockedUsers, msg.author.id)) return;
                    const div = buildMessage(msg);
                    messageList.appendChild(div);
                    parseTwemoji(div);
                    loadMediaInMessage(div);
                });

                if (!silent || atBottom) {
                    messageList.scrollTop = messageList.scrollHeight;
                } else {
                    messageList.scrollTop = prevScrollTop + (messageList.scrollHeight - prevScrollHeight);
                }
            } catch (err) {
                if (!silent) {
                    clearBlobUrls();
                    messageList.innerHTML = '';
                    messageList.appendChild(placeholder(`Failed to load messages: ${err.message}`, true));
                }
            }
        }

        function buildMessage(msg) {
            const div  = document.createElement('div');
            div.className = 'message';

            const date     = new Date(msg.timestamp);
            const isToday  = date.toDateString() === new Date().toDateString();
            const timeStr  = isToday
                ? `Today at ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                : date.toLocaleString([], { month: 'numeric', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            const displayName = msg.author?.global_name || msg.author?.username || 'Unknown';
            const actualUsername = msg.author?.username || '';

            let attachHtml = '';
            (msg.attachments || []).forEach((att, idx) => {
                const id   = `att-${msg.id}-${idx}`;
                const type = att.content_type || '';
                const name = escapeHtml(att.filename || 'file');
                const proxyUrl = escapeHtml(type.startsWith('image/') ? (att.proxy_url || att.url) : att.url);
                if (type.startsWith('image/')) {
                    attachHtml += `<img id="${id}" class="attachment-preview" alt="${name}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-proxy-url="${proxyUrl}" data-filename="${name}">`;
                } else if (type.startsWith('video/')) {
                    attachHtml += `<video id="${id}" controls class="attachment-preview" data-proxy-url="${proxyUrl}" data-filename="${name}"></video>`;
                } else {
                    attachHtml += `<a id="${id}" class="attachment-link" data-proxy-url="${proxyUrl}" data-filename="${name}">&#x1F4CE; ${name}</a>`;
                }
            });

            div.innerHTML = `
                <div class="message-header">
                    <span class="author">${escapeHtml(displayName)}${actualUsername ? `<span class="author-tooltip">@${escapeHtml(actualUsername)}</span>` : ''}</span>
                    <span class="timestamp">${timeStr}</span>
                </div>
                <div class="content">${escapeHtml(msg.content)}</div>
                ${attachHtml}
            `;

            const authorEl = div.querySelector('.author');
            if (authorEl && msg.author) {
                authorEl.oncontextmenu = e => showContextMenu(e, 'user', msg.author.id, displayName);
            }

            return div;
        }

        function loadMediaInMessage(div) {
            div.querySelectorAll('[data-proxy-url]').forEach(el => {
                const url      = el.dataset.proxyUrl;
                const filename = el.dataset.filename || url.split('/').pop().split('?')[0];

                if (el.tagName === 'IMG' || el.tagName === 'VIDEO') {
                    el.src = url;
                    if (el.tagName === 'IMG') el.alt = filename;

                    proxyMedia(url).then(({ blobUrl }) => {
                        activeBlobUrls.push(blobUrl);
                        el.src = blobUrl;
                        addDownloadLink(el, blobUrl, filename);
                    }).catch(() => {
                        const link       = document.createElement('a');
                        link.href        = url;
                        link.target      = '_blank';
                        link.className   = 'download-link';
                        link.textContent = 'Open';
                        el.after(link);
                    });
                } else {
                    proxyMedia(url).then(({ blobUrl }) => {
                        activeBlobUrls.push(blobUrl);
                        el.href     = blobUrl;
                        el.download = filename;
                        el.target   = '';
                    }).catch(() => {
                        el.href   = url;
                        el.target = '_blank';
                    });
                }
            });
        }

        // ── Send Message ──────────────────────────────────────
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const content  = messageInput.value.trim();
            const hasFiles = fileInput.files.length > 0;
            if (!content && !hasFiles) return;
            if (!currentChannelId) return;

            messageInput.disabled = true;
            sendButton.disabled   = true;
            try {
                let body, extraHeaders = {};
                if (hasFiles) {
                    const fd = new FormData();
                    fd.append('file[0]', fileInput.files[0]);
                    fd.append('payload_json', JSON.stringify({ content }));
                    body = fd;
                } else {
                    body = JSON.stringify({ content });
                    extraHeaders['Content-Type'] = 'application/json';
                }

                const res = await fetch(`${getApiBase()}/channels/${currentChannelId}/messages`, {
                    method: 'POST',
                    headers: { 'Authorization': userToken, ...extraHeaders },
                    body
                });

                if (!res.ok) throw new Error(`Status ${res.status}`);

                messageInput.value       = '';
                fileInput.value          = '';
                fileBtn.classList.remove('active');
                messageInput.placeholder = 'Message...';
                loadMessages(currentChannelId);
            } catch (err) {
                alert(`Failed to send: ${err.message}`);
                messageInput.focus();
            } finally {
                messageInput.disabled = false;
                sendButton.disabled   = false;
            }
        }

        // ── Proxy / Media ─────────────────────────────────────
        async function proxyMedia(url) {
            const res = await fetch(`${clientConfig.proxyBase}/image`, {
                headers: { 'mediaurl': url }
            });
            if (!res.ok) throw new Error(res.status);
            const blob    = await res.blob();
            const blobUrl = URL.createObjectURL(blob);
            return { blobUrl, blob };
        }

        function addDownloadLink(el, blobUrl, filename) {
            const a       = document.createElement('a');
            a.href        = blobUrl;
            a.download    = filename;
            a.className   = 'download-link';
            a.textContent = 'Download';
            el.after(a);
        }

        function clearBlobUrls() {
            activeBlobUrls.forEach(u => URL.revokeObjectURL(u));
            activeBlobUrls = [];
        }

        // ── Add DM Modal ─────────────────────────────────────
        function openAddDmModal() {
            document.getElementById('add-dm-user-id').value = '';
            document.getElementById('add-dm-modal').style.display = 'flex';
            document.getElementById('add-dm-user-id').focus();
        }

        function closeAddDmModal() {
            document.getElementById('add-dm-modal').style.display = 'none';
        }

        document.getElementById('add-dm-submit').addEventListener('click', addDm);
        document.getElementById('add-dm-user-id').addEventListener('keydown', e => {
            if (e.key === 'Enter') addDm();
        });

        async function addDm() {
            const userId = document.getElementById('add-dm-user-id').value.trim();
            if (!userId) return;
            try {
                const channel = await apiCall('/users/@me/channels', {
                    method: 'POST',
                    body: JSON.stringify({ recipients: [userId] })
                });
                closeAddDmModal();
                currentView = 'dm';
                await loadDMs();
                const name = channel.recipients?.map(r => r.global_name || r.username).join(', ') || 'DM';
                chatTitle.textContent = name;
                loadMessages(channel.id);
            } catch (err) {
                alert(`Failed to open DM: ${err.message}`);
            }
        }

        // ── Helpers ───────────────────────────────────────────
        function makeItem(className, text, onclick) {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            div.addEventListener('click', onclick);
            return div;
        }

        function sidebarLabel(text) {
            const div = document.createElement('div');
            div.className   = 'sidebar-label';
            div.textContent = text;
            return div;
        }

        function placeholder(text, isError = false) {
            const div = document.createElement('div');
            div.className   = `placeholder${isError ? ' error' : ''}`;
            div.textContent = text;
            return div;
        }

        function parseTwemoji(el) {
            twemoji.parse(el, {
                base:      'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/',
                folder:    'svg',
                ext:       '.svg',
                className: 'twemoji'
            });
        }

        function escapeHtml(str) {
            return (str || '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[c]));
        }

        // ── Sync refresh input ───────────────────────────────
        document.getElementById('setting-refresh').value = settings.refreshInterval;

        // ── PWA: Inline Manifest ─────────────────────────────
        // Generate an SVG icon as a data URI (no external files needed)
        const pwaIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <rect width="512" height="512" rx="96" fill="#5865f2"/>
            <path d="M346 218c-14-7-29-12-45-15l-5 11c-17-3-34-3-51 0l-5-11c-16 3-31 8-45 15-29 42-36 84-32 124 20 15 39 24 58 30l7-10-2-1c-11-5-21-12-31-19l4-3c51 24 107 24 157 0l4 3c-10 7-20 14-31 19l-2 1 7 10c19-6 39-15 58-30 5-47-8-88-32-124z" fill="#fff"/>
            <circle cx="215" cy="295" r="25" fill="#5865f2"/>
            <circle cx="297" cy="295" r="25" fill="#5865f2"/>
        </svg>`;
        const pwaIconUrl = 'data:image/svg+xml;base64,' + btoa(pwaIconSvg);

        const manifest = {
            name: 'Local Discord Client',
            short_name: 'Discord',
            description: 'A static Discord client that runs through a CORS proxy.',
            start_url: './',
            display: 'standalone',
            background_color: '#36393f',
            theme_color: '#36393f',
            icons: [
                { src: pwaIconUrl, sizes: 'any', type: 'image/svg+xml', purpose: 'any maskable' }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const manifestUrl = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestUrl;
        document.head.appendChild(manifestLink);

        // Also set the apple-touch-icon
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.href = pwaIconUrl;
        document.head.appendChild(appleIcon);

        // ── PWA: Inline Service Worker ───────────────────────
        const swCode = `
            const CACHE_NAME = 'discord-client-v1';
            const SHELL_URLS = [self.registration.scope];

            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME).then(cache => cache.addAll(SHELL_URLS))
                );
                self.skipWaiting();
            });

            self.addEventListener('activate', event => {
                event.waitUntil(
                    caches.keys().then(keys =>
                        Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
                    )
                );
                self.clients.claim();
            });

            self.addEventListener('fetch', event => {
                const url = new URL(event.request.url);

                // Only cache-first for navigation (the HTML shell itself)
                if (event.request.mode === 'navigate') {
                    event.respondWith(
                        caches.match(event.request).then(cached => {
                            // Serve cached shell, update in background
                            const fetchPromise = fetch(event.request).then(response => {
                                if (response.ok) {
                                    caches.open(CACHE_NAME).then(cache =>
                                        cache.put(event.request, response)
                                    );
                                }
                                return response.clone();
                            }).catch(() => cached);

                            return cached || fetchPromise;
                        })
                    );
                    return;
                }

                // For image proxy responses, cache them client-side long-term
                if (url.pathname === '/image') {
                    event.respondWith(
                        caches.open('discord-media-v1').then(cache =>
                            cache.match(event.request).then(cached => {
                                if (cached) return cached;
                                return fetch(event.request).then(response => {
                                    if (response.ok) {
                                        cache.put(event.request, response.clone());
                                    }
                                    return response;
                                });
                            })
                        )
                    );
                    return;
                }

                // Everything else (API calls, CDN) goes to network
            });
        `;

        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {
                // Blob SW registration fails in some browsers due to origin restrictions.
                // The app still works fine without it -- just no offline caching.
            });
        }

        // ── Start ────────────────────────────────────────────
        init();
    </script>
</body>
